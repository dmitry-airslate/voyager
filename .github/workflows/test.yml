name: Tests

on:
  push:
    branches:
      - '1.*'
  pull_request:
    types:
      - synchronize
      - opened
      - edited
      - reopened

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^11.0'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'

    name: 'PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select PHP version
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php }}'
          extensions: mbstring, pdo_sqlite, fileinfo, gd
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'
          cache: npm

      - name: Configure Laravel test matrix
        run: |
          composer require --dev \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-update \
            --no-interaction \
            --no-ansi

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --no-ansi --with-all-dependencies

      - name: Show installed versions
        run: |
          composer show laravel/framework
          composer show orchestra/testbench

      - name: Generate vendor symlink
        run: ./vendor/bin/testbench

      - name: Install NPM dependencies
        run: npm ci

      - name: Compile Assets
        run: npm run prod

      - name: Run tests
        run: ./vendor/bin/phpunit --no-coverage
