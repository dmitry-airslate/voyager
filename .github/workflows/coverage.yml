name: Coverage

on:
  push:
    branches:
      - '1.*'
  pull_request:
    types:
      - synchronize
      - opened
      - edited
      - reopened

jobs:
  coverage:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: voyager_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: voyager_test
      DB_USERNAME: root
      DB_PASSWORD: root

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^11.0'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'

    name: 'PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select PHP version
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php }}'
          extensions: mbstring, pdo_sqlite, pdo_mysql, fileinfo, gd
          coverage: pcov
          tools: composer:v2

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot --silent && exit 0
            sleep 2
          done
          echo "MySQL is not ready"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'
          cache: npm

      - name: Configure Laravel test environment
        run: |
          composer require --dev \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-update \
            --no-interaction \
            --no-ansi

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --no-ansi --with-all-dependencies

      - name: Show installed versions
        run: |
          composer show laravel/framework
          composer show orchestra/testbench

      - name: Generate vendor symlink
        run: ./vendor/bin/testbench

      - name: Install NPM dependencies
        run: npm ci

      - name: Compile Assets
        run: npm run prod

      - name: Run tests for coverage
        run: php -d pcov.enabled=1 ./vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload coverage
        run: bash <(curl -s https://codecov.io/bash)